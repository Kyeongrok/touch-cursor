name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $parts = $version.Split('.')
          while ($parts.Count -lt 3) { $parts += '0' }
          $version = $parts -join '.'
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore touch-cursor/touch-cursor.csproj

      - name: Publish
        run: dotnet publish touch-cursor/touch-cursor.csproj -c Release -o publish --no-restore -p:Version=${{ steps.version.outputs.version }} -p:AssemblyVersion=${{ steps.version.outputs.version }} -p:FileVersion=${{ steps.version.outputs.version }}

      - name: Install vpk
        run: dotnet tool install -g vpk --version 0.0.1298

      - name: Download previous release for delta updates
        shell: pwsh
        run: vpk download github --repoUrl https://github.com/Kyeongrok/touch-cursor --token ${{ secrets.GITHUB_TOKEN }} --outputDir releases
        continue-on-error: true

      - name: Pack with Velopack
        run: vpk pack --packId TouchCursor --packTitle "TouchCursor" --packAuthors "Kyeongrok" --packVersion ${{ steps.version.outputs.version }} --packDir publish --mainExe touch-cursor.exe --outputDir releases --icon touch-cursor/app.ico

      - name: Upload to GitHub Releases
        run: vpk upload github --repoUrl https://github.com/Kyeongrok/touch-cursor --token ${{ secrets.GITHUB_TOKEN }} --tag ${{ github.ref_name }} --releaseName "${{ github.ref_name }}" --outputDir releases --publish --merge
